<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FISS — Faizan Islamic School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var savedTheme = localStorage.getItem('theme');
        var mode = savedTheme === 'light' || savedTheme === 'dark' || savedTheme === 'system' ? savedTheme : 'system';
        var isDark =
          mode === 'dark' ||
          (mode === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';

        var savedLang = localStorage.getItem('lang');
        var lang = savedLang === 'en' || savedLang === 'ur' || savedLang === 'ar' ? savedLang : 'en';
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ur' || lang === 'ar' ? 'rtl' : 'ltr';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
