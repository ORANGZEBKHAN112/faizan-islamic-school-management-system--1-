# Nginx reverse proxy for FISS ERP
# Install: sudo cp deploy/nginx/fiss-erp.conf /etc/nginx/sites-available/fiss-erp
#          sudo ln -sf /etc/nginx/sites-available/fiss-erp /etc/nginx/sites-enabled/
# Replace erp.example.com with your domain, then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name erp.example.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
